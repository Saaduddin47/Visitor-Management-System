

services:
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: vms-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb+srv://Azhaan:mk9RVr2U6BogpQFM@vms.959nquq.mongodb.net/?appName=VMS
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
      - /app/server/node_modules

  client:
    build: ./client
    container_name: vms-client
    restart: always
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

